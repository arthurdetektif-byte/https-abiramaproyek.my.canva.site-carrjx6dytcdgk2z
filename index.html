<!doctype html>
<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital POS &amp; Stock</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="/_sdk/data_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'DM Sans', sans-serif; }
    .tab-active { background: #1e293b; color: #f8fafc; }
    .tab-inactive { background: #e2e8f0; color: #475569; }
    .toast-show { animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }
  </style>
  <style>body { box-sizing: border-box; }</style>
 <script src="/_sdk/telemetry_sdk.js"></script></head>
 <body class="h-full bg-slate-50 text-slate-800">
  <div id="login-view" class="h-full w-full flex items-center justify-center bg-gradient-to-br from-slate-900 to-slate-800">
   <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-sm mx-4">
    <div class="text-center mb-8">
     <div class="flex justify-center mb-4">
      <i data-lucide="lock" class="w-8 h-8 text-emerald-600"></i>
     </div>
     <h2 class="text-2xl font-bold text-slate-900">Masuk</h2>
     <p class="text-sm text-slate-500 mt-2">Masukkan sandi untuk akses sistem</p>
    </div>
    <form onsubmit="handleLogin(event)" class="space-y-4">
     <div><label class="block text-sm font-medium text-slate-700 mb-2">Sandi</label> <input id="password-input" type="password" placeholder="Masukkan sandi" class="w-full px-4 py-2.5 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 text-sm" required autocomplete="off">
     </div><button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-2.5 rounded-lg font-semibold text-sm transition-colors">Masuk</button>
    </form>
    <div id="login-error" class="mt-4 p-3 bg-red-50 text-red-600 text-sm rounded-lg hidden text-center">
     Sandi salah
    </div>
   </div>
  </div>
  <div id="app" class="h-full w-full flex flex-col overflow-auto hidden">
   <!-- Header -->
   <header class="bg-slate-900 text-white px-4 py-3 flex items-center justify-between shrink-0">
    <div class="flex items-center gap-2">
     <i data-lucide="store" class="w-5 h-5 text-emerald-400"></i>
     <h1 id="store-title" class="text-lg font-bold">Toko Saya</h1>
    </div>
    <div class="text-xs text-slate-400" id="date-display"></div>
   </header><!-- Tabs -->
   <nav class="flex gap-1 p-2 bg-white border-b shrink-0">
    <button onclick="switchTab('cashier')" id="tab-cashier" class="tab-active px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-1 transition-all"> <i data-lucide="shopping-cart" class="w-4 h-4"></i> Kasir </button> <button onclick="switchTab('stock')" id="tab-stock" class="tab-inactive px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-1 transition-all"> <i data-lucide="package" class="w-4 h-4"></i> Stok </button> <button onclick="switchTab('history')" id="tab-history" class="tab-inactive px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-1 transition-all"> <i data-lucide="receipt" class="w-4 h-4"></i> Riwayat </button>
   </nav><!-- Toast -->
   <div id="toast" class="fixed top-4 right-4 bg-emerald-600 text-white px-4 py-2 rounded-lg shadow-lg text-sm z-50 hidden toast-show"></div><!-- Content -->
   <main class="flex-1 overflow-auto">
    <!-- KASIR TAB -->
    <div id="view-cashier" class="p-4 space-y-4">
     <!-- Search Products -->
     <div class="relative">
      <i data-lucide="search" class="w-4 h-4 absolute left-3 top-3 text-slate-400"></i> <input id="cashier-search" type="text" placeholder="Cari produk..." class="w-full pl-10 pr-4 py-2.5 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500" oninput="renderCashierProducts()">
     </div><!-- Product Grid -->
     <div id="cashier-products" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-2"></div><!-- Cart -->
     <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
      <div class="bg-slate-800 text-white px-4 py-2 text-sm font-semibold flex items-center gap-2">
       <i data-lucide="shopping-bag" class="w-4 h-4"></i> Keranjang
      </div>
      <div id="cart-items" class="divide-y divide-slate-100 max-h-48 overflow-auto"></div>
      <div class="p-4 border-t bg-slate-50">
       <div class="flex justify-between font-bold text-lg mb-3">
        <span>Total</span> <span id="cart-total">Rp 0</span>
       </div>
       <div class="flex gap-2 mb-3">
        <select id="payment-method" class="flex-1 border border-slate-200 rounded-lg px-3 py-2 text-sm"> <option value="Tunai">Tunai</option> <option value="Transfer">Transfer</option> <option value="QRIS">QRIS</option> </select>
       </div><button onclick="checkout()" id="btn-checkout" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-2.5 rounded-lg font-semibold text-sm transition-colors disabled:opacity-50 disabled:cursor-not-allowed" disabled> Bayar </button>
      </div>
     </div>
    </div><!-- STOK TAB -->
    <div id="view-stock" class="p-4 space-y-4 hidden">
     <!-- Add Product Form -->
     <div class="bg-white rounded-xl border border-slate-200 p-4">
      <h3 class="font-semibold text-sm mb-3 flex items-center gap-2"><i data-lucide="plus-circle" class="w-4 h-4 text-emerald-600"></i> Tambah Produk</h3>
      <form id="form-product" onsubmit="addProduct(event)" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
       <input name="name" placeholder="Nama produk" required class="border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500"> <input name="price" type="number" min="0" placeholder="Harga" required class="border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500"> <input name="stock" type="number" min="0" placeholder="Jumlah stok" required class="border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500"> <input name="category" placeholder="Kategori" class="border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500"> <button type="submit" class="sm:col-span-2 bg-slate-800 hover:bg-slate-900 text-white py-2.5 rounded-lg font-semibold text-sm transition-colors">Simpan Produk</button>
      </form>
     </div><!-- Stock List -->
     <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
      <div class="px-4 py-2 bg-slate-100 border-b text-sm font-semibold text-slate-600">
       Daftar Stok
      </div>
      <div id="stock-list" class="divide-y divide-slate-100 max-h-96 overflow-auto"></div>
      <div id="stock-empty" class="p-8 text-center text-slate-400 text-sm">
       Belum ada produk. Tambahkan produk pertama Anda.
      </div>
     </div>
    </div><!-- HISTORY TAB -->
    <div id="view-history" class="p-4 space-y-4 hidden">
     <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
      <div class="px-4 py-2 bg-slate-100 border-b text-sm font-semibold text-slate-600 flex items-center justify-between">
       <span>Riwayat Transaksi</span> <span id="history-count" class="text-xs text-slate-400"></span>
      </div>
      <div id="history-list" class="divide-y divide-slate-100 max-h-96 overflow-auto"></div>
      <div id="history-empty" class="p-8 text-center text-slate-400 text-sm">
       Belum ada transaksi.
      </div>
     </div><!-- Summary -->
     <div class="grid grid-cols-2 gap-3">
      <div class="bg-emerald-50 border border-emerald-200 rounded-xl p-4 text-center">
       <div class="text-xs text-emerald-600 font-medium">
        Total Pendapatan
       </div>
       <div id="total-revenue" class="text-lg font-bold text-emerald-700 mt-1">
        Rp 0
       </div>
      </div>
      <div class="bg-blue-50 border border-blue-200 rounded-xl p-4 text-center">
       <div class="text-xs text-blue-600 font-medium">
        Total Transaksi
       </div>
       <div id="total-transactions" class="text-lg font-bold text-blue-700 mt-1">
        0
       </div>
      </div>
     </div>
    </div>
   </main><!-- Edit Product Modal -->
   <div id="edit-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-xl p-6 mx-4 max-w-sm w-full shadow-xl">
     <h3 class="text-lg font-bold mb-4">Edit Produk</h3>
     <form id="form-edit" onsubmit="confirmEdit(event)" class="space-y-3">
      <input id="edit-name" placeholder="Nama produk" required class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500"> <input id="edit-price" type="number" min="0" placeholder="Harga" required class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500"> <input id="edit-stock" type="number" min="0" placeholder="Jumlah stok" required class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500"> <input id="edit-category" placeholder="Kategori" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
      <div class="flex gap-2 pt-2">
       <button type="submit" class="flex-1 bg-emerald-600 text-white py-2 rounded-lg text-sm font-medium">Simpan</button> <button type="button" onclick="closeEditModal()" class="flex-1 bg-slate-200 text-slate-700 py-2 rounded-lg text-sm font-medium">Batal</button>
      </div>
     </form>
    </div>
   </div><!-- Delete Confirmation -->
   <div id="delete-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-xl p-6 mx-4 max-w-sm w-full shadow-xl">
     <p class="text-sm font-medium mb-4">Hapus produk ini?</p>
     <div class="flex gap-2">
      <button onclick="confirmDelete()" class="flex-1 bg-red-600 text-white py-2 rounded-lg text-sm font-medium">Hapus</button> <button onclick="closeDeleteModal()" class="flex-1 bg-slate-200 text-slate-700 py-2 rounded-lg text-sm font-medium">Batal</button>
     </div>
    </div>
   </div>
  </div>
  <script>
  // Constants
  const CORRECT_PASSWORD = 'funnybunny';

  // State
  let allData = [];
  let cart = [];
  let currentTab = 'cashier';
  let deleteTarget = null;
  let currency = 'Rp';
  let isAuthenticated = false;

  // Login handler
  function handleLogin(e) {
    e.preventDefault();
    const password = document.getElementById('password-input').value;
    const errorDiv = document.getElementById('login-error');
    
    if (password === CORRECT_PASSWORD) {
      isAuthenticated = true;
      document.getElementById('login-view').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      lucide.createIcons();
    } else {
      errorDiv.classList.remove('hidden');
      document.getElementById('password-input').value = '';
      setTimeout(() => errorDiv.classList.add('hidden'), 3000);
    }
  }

  const defaultConfig = {
    store_name: 'Toko Saya',
    currency_symbol: 'Rp',
    background_color: '#f8fafc',
    surface_color: '#ffffff',
    text_color: '#1e293b',
    primary_action: '#059669',
    secondary_action: '#1e293b'
  };

  // Products & Transactions helpers
  function getProducts() { return allData.filter(d => d.type === 'product'); }
  function getTransactions() { return allData.filter(d => d.type === 'transaction'); }

  // Format currency
  function fmt(n) { return currency + ' ' + Number(n).toLocaleString('id-ID'); }

  // Toast
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.remove('hidden');
    setTimeout(() => t.classList.add('hidden'), 2500);
  }

  // Tabs
  function switchTab(tab) {
    currentTab = tab;
    ['cashier','stock','history'].forEach(t => {
      document.getElementById('view-' + t).classList.toggle('hidden', t !== tab);
      document.getElementById('tab-' + t).className = t === tab ? 'tab-active px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-1 transition-all' : 'tab-inactive px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-1 transition-all';
    });
    if (tab === 'cashier') renderCashierProducts();
  }

  // Render cashier product grid
  function renderCashierProducts() {
    const search = document.getElementById('cashier-search').value.toLowerCase();
    const products = getProducts().filter(p => p.stock > 0 && p.name.toLowerCase().includes(search));
    const container = document.getElementById('cashier-products');
    container.innerHTML = products.length === 0 ? '<p class="col-span-full text-center text-slate-400 text-sm py-4">Tidak ada produk tersedia</p>' : '';
    products.forEach(p => {
      const div = document.createElement('div');
      div.className = 'bg-white border border-slate-200 rounded-lg p-3 cursor-pointer hover:border-emerald-400 hover:shadow-sm transition-all';
      div.onclick = () => addToCart(p);
      div.innerHTML = `<div class="text-xs font-medium text-slate-800 truncate">${p.name}</div><div class="text-emerald-600 font-bold text-sm mt-1">${fmt(p.price)}</div><div class="text-xs text-slate-400 mt-0.5">Stok: ${p.stock}</div>`;
      container.appendChild(div);
    });
  }

  // Cart
  function addToCart(product) {
    const existing = cart.find(c => c.__backendId === product.__backendId);
    if (existing) {
      if (existing.qty >= product.stock) { showToast('Stok tidak cukup'); return; }
      existing.qty++;
    } else {
      cart.push({ ...product, qty: 1 });
    }
    renderCart();
  }

  function renderCart() {
    const container = document.getElementById('cart-items');
    container.innerHTML = '';
    let total = 0;
    cart.forEach((item, i) => {
      total += item.price * item.qty;
      const div = document.createElement('div');
      div.className = 'flex items-center justify-between px-4 py-2';
      div.innerHTML = `<div class="flex-1"><div class="text-sm font-medium">${item.name}</div><div class="text-xs text-slate-400">${fmt(item.price)} × ${item.qty}</div></div><div class="flex items-center gap-2"><span class="text-sm font-semibold">${fmt(item.price * item.qty)}</span><button onclick="removeFromCart(${i})" class="text-red-400 hover:text-red-600"><i data-lucide="x" class="w-4 h-4"></i></button></div>`;
      container.appendChild(div);
    });
    document.getElementById('cart-total').textContent = fmt(total);
    document.getElementById('btn-checkout').disabled = cart.length === 0;
    lucide.createIcons();
  }

  function removeFromCart(i) { cart.splice(i, 1); renderCart(); }

  // Checkout
  async function checkout() {
    if (cart.length === 0) return;
    const btn = document.getElementById('btn-checkout');
    btn.disabled = true;
    btn.textContent = 'Memproses...';

    const total = cart.reduce((s, c) => s + c.price * c.qty, 0);
    const items = cart.map(c => c.name + '(' + c.qty + ')').join(', ');
    const method = document.getElementById('payment-method').value;

    // Update stock
    for (const item of cart) {
      const product = getProducts().find(p => p.__backendId === item.__backendId);
      if (product) {
        const updated = { ...product, stock: product.stock - item.qty };
        await window.dataSdk.update(updated);
      }
    }

    // Create transaction
    if (allData.filter(d => d.type === 'transaction').length >= 900) {
      showToast('Batas transaksi hampir penuh!');
    }
    const result = await window.dataSdk.create({
      type: 'transaction',
      name: items,
      price: 0,
      stock: 0,
      category: '',
      created_at: new Date().toISOString(),
      quantity: cart.reduce((s, c) => s + c.qty, 0),
      total: total,
      payment_method: method
    });

    if (result.isOk) {
      cart = [];
      renderCart();
      showToast('Transaksi berhasil! ' + fmt(total));
    } else {
      showToast('Gagal menyimpan transaksi');
    }
    btn.textContent = 'Bayar';
  }

  // Add Product
  async function addProduct(e) {
    e.preventDefault();
    if (allData.length >= 999) { showToast('Batas penyimpanan tercapai (999)'); return; }
    const form = e.target;
    const data = new FormData(form);
    const result = await window.dataSdk.create({
      type: 'product',
      name: data.get('name'),
      price: Number(data.get('price')),
      stock: Number(data.get('stock')),
      category: data.get('category') || 'Umum',
      created_at: new Date().toISOString(),
      quantity: 0,
      total: 0,
      payment_method: ''
    });
    if (result.isOk) { form.reset(); showToast('Produk ditambahkan!'); }
    else showToast('Gagal menyimpan produk');
  }

  // Delete product
  function openDeleteModal(id) { deleteTarget = id; document.getElementById('delete-modal').classList.remove('hidden'); }
  function closeDeleteModal() { deleteTarget = null; document.getElementById('delete-modal').classList.add('hidden'); }
  async function confirmDelete() {
    if (!deleteTarget) return;
    const item = allData.find(d => d.__backendId === deleteTarget);
    if (item) await window.dataSdk.delete(item);
    closeDeleteModal();
    showToast('Produk dihapus');
  }

  // Edit product
  let editTarget = null;
  function openEditModal(id) {
    editTarget = id;
    const product = getProducts().find(p => p.__backendId === id);
    if (product) {
      document.getElementById('edit-name').value = product.name;
      document.getElementById('edit-price').value = product.price;
      document.getElementById('edit-stock').value = product.stock;
      document.getElementById('edit-category').value = product.category || '';
      document.getElementById('edit-modal').classList.remove('hidden');
    }
  }
  function closeEditModal() { editTarget = null; document.getElementById('edit-modal').classList.add('hidden'); }
  async function confirmEdit(e) {
    e.preventDefault();
    if (!editTarget) return;
    const product = getProducts().find(p => p.__backendId === editTarget);
    if (product) {
      const updated = {
        ...product,
        name: document.getElementById('edit-name').value,
        price: Number(document.getElementById('edit-price').value),
        stock: Number(document.getElementById('edit-stock').value),
        category: document.getElementById('edit-category').value
      };
      const result = await window.dataSdk.update(updated);
      if (result.isOk) {
        showToast('Produk diperbarui!');
        closeEditModal();
      } else {
        showToast('Gagal memperbarui produk');
      }
    }
  }

  // Render stock list
  function renderStockList() {
    const products = getProducts();
    const container = document.getElementById('stock-list');
    const empty = document.getElementById('stock-empty');
    empty.classList.toggle('hidden', products.length > 0);
    container.innerHTML = '';
    products.forEach(p => {
      const div = document.createElement('div');
      div.className = 'flex items-center justify-between px-4 py-3';
      div.innerHTML = `<div><div class="text-sm font-medium">${p.name}</div><div class="text-xs text-slate-400">${p.category || 'Umum'} · ${fmt(p.price)}</div></div><div class="flex items-center gap-2"><span class="text-sm font-semibold ${p.stock < 5 ? 'text-red-500' : 'text-slate-700'}">${p.stock}</span><button onclick="openEditModal('${p.__backendId}')" class="text-slate-400 hover:text-emerald-500"><i data-lucide="edit-2" class="w-4 h-4"></i></button><button onclick="openDeleteModal('${p.__backendId}')" class="text-slate-400 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div>`;
      container.appendChild(div);
    });
    lucide.createIcons();
  }

  // Render history
  function renderHistory() {
    const txs = getTransactions().sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    const container = document.getElementById('history-list');
    const empty = document.getElementById('history-empty');
    empty.classList.toggle('hidden', txs.length > 0);
    document.getElementById('history-count').textContent = txs.length + ' transaksi';
    container.innerHTML = '';
    txs.forEach(tx => {
      const d = new Date(tx.created_at);
      const div = document.createElement('div');
      div.className = 'px-4 py-3';
      div.innerHTML = `<div class="flex justify-between"><div class="text-sm font-medium">${tx.name}</div><div class="text-sm font-bold text-emerald-600">${fmt(tx.total)}</div></div><div class="flex justify-between mt-1"><div class="text-xs text-slate-400">${d.toLocaleDateString('id-ID')} ${d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})}</div><div class="text-xs text-slate-500">${tx.payment_method}</div></div>`;
      container.appendChild(div);
    });
    const revenue = txs.reduce((s, t) => s + (t.total || 0), 0);
    document.getElementById('total-revenue').textContent = fmt(revenue);
    document.getElementById('total-transactions').textContent = txs.length;
  }

  // Data SDK
  const dataHandler = {
    onDataChanged(data) {
      allData = data;
      renderStockList();
      renderCashierProducts();
      renderHistory();
    }
  };

  // Element SDK
  window.elementSdk.init({
    defaultConfig,
    onConfigChange: async (config) => {
      const storeName = config.store_name || defaultConfig.store_name;
      currency = config.currency_symbol || defaultConfig.currency_symbol;
      document.getElementById('store-title').textContent = storeName;
      document.getElementById('app').style.backgroundColor = config.background_color || defaultConfig.background_color;
      // Re-render with new currency
      renderCart();
      renderStockList();
      renderHistory();
      renderCashierProducts();
    },
    mapToCapabilities: (config) => ({
      recolorables: [
        { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
        { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
        { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
        { get: () => config.primary_action || defaultConfig.primary_action, set: (v) => { config.primary_action = v; window.elementSdk.setConfig({ primary_action: v }); } },
        { get: () => config.secondary_action || defaultConfig.secondary_action, set: (v) => { config.secondary_action = v; window.elementSdk.setConfig({ secondary_action: v }); } }
      ],
      borderables: [],
      fontEditable: { get: () => config.font_family || 'DM Sans', set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
      fontSizeable: undefined
    }),
    mapToEditPanelValues: (config) => new Map([
      ["store_name", config.store_name || defaultConfig.store_name],
      ["currency_symbol", config.currency_symbol || defaultConfig.currency_symbol]
    ])
  });

  // Init
  (async () => {
